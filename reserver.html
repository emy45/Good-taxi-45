  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0b0b0b;
      --saffron: #f5c518;
      --paper: #faf8f3;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--ink);
      color: #fff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 2rem 1.25rem;
      gap: 0;
    }

    /* LOGO */
    .logo {
      display: block;
      width: 180px;
      margin: 0 auto 2rem;
    }

    /* TITRE */
    .heading {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .heading h1 {
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 800;
      line-height: 1.2;
    }
    .heading h1 span {
      color: var(--saffron);
    }
    .heading p {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      opacity: 0.65;
      font-weight: 500;
    }

    /* BADGE DISPO */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(245,197,24,0.12);
      border: 1px solid rgba(245,197,24,0.3);
      color: var(--saffron);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin: 1.25rem auto 2rem;
    }
    .badge .dot {
      width: 7px;
      height: 7px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* BOUTONS */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.1rem 1.5rem;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn--call {
      background: var(--saffron);
      color: var(--ink);
      font-size: 1.15rem;
    }
    .btn--whatsapp {
      background: #25d366;
      color: #fff;
    }
    .btn--form {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn svg { flex-shrink: 0; }

    /* SÉPARATEUR */
    .sep {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      width: 100%;
      max-width: 400px;
      margin: 0.25rem 0;
    }
    .sep::before, .sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* INFOS BAS */
    .infos {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.4;
      line-height: 1.8;
    }
  </style>
