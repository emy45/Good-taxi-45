<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réserver un taxi — Good Taxis 45</title>
  <meta name="description" content="Réservez votre taxi Good Taxis 45 dans le Loiret. Disponible 7j/7 et 24h/24. ☎ 02 38 24 11 51." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="logo_ok.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0b0b0b;
      --saffron: #f5c518;
      --paper: #faf8f3;
      --line: rgba(255,255,255,0.1);
      --radius: 14px;
    }

    html, body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--ink);
      color: #fff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100svh;
      padding: 2rem 1.25rem 3rem;
    }

    /* LOGO */
    .logo {
      display: block;
      width: 160px;
      margin: 0 auto 1.5rem;
    }

    /* TITRE */
    .heading {
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .heading h1 {
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      font-weight: 800;
      line-height: 1.2;
    }
    .heading h1 span { color: var(--saffron); }
    .heading p {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      opacity: 0.55;
      font-weight: 500;
    }

    /* BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(245,197,24,0.12);
      border: 1px solid rgba(245,197,24,0.3);
      color: var(--saffron);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      margin: 1rem auto 1.75rem;
    }
    .badge .dot {
      width: 7px; height: 7px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.8); }
    }

    /* BOUTONS RAPIDES */
    .quick-actions {
      display: flex;
      gap: 0.75rem;
      width: 100%;
      max-width: 460px;
      margin-bottom: 1.75rem;
    }
    .btn-quick {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 0.75rem;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-quick:active { transform: scale(0.97); }
    .btn-quick--call { background: var(--saffron); color: var(--ink); }
    .btn-quick--wa { background: #25d366; color: #fff; }

    /* SÉPARATEUR */
    .sep {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      width: 100%;
      max-width: 460px;
      margin-bottom: 1.75rem;
    }
    .sep::before, .sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* FORMULAIRE */
    .form-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 1.75rem 1.5rem;
    }
    .form-card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      opacity: 0.9;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      opacity: 0.6;
      letter-spacing: 0.03em;
    }

    input, select, textarea {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.75rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }
    input:focus, select:focus, textarea:focus {
      border-color: var(--saffron);
    }
    select option { background: #1a1a1a; color: #fff; }
    textarea { resize: vertical; min-height: 80px; }

    /* Autocomplete dropdown */
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 2px);
      left: 0; right: 0;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .autocomplete-list li {
      list-style: none;
      padding: 0.7rem 0.9rem;
      font-size: 0.88rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
    }
    .autocomplete-list li:last-child { border-bottom: none; }
    .autocomplete-list li:hover, .autocomplete-list li.active {
      background: rgba(245,197,24,0.12);
      color: #fff;
    }

    /* RGPD */
    .rgpd {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin: 0.75rem 0 1.25rem;
    }
    .rgpd input[type="checkbox"] {
      width: 18px; height: 18px;
      flex-shrink: 0;
      margin-top: 1px;
      accent-color: var(--saffron);
      cursor: pointer;
    }
    .rgpd label {
      font-size: 0.75rem;
      opacity: 0.55;
      line-height: 1.5;
      cursor: pointer;
    }

    /* SUBMIT */
    .btn-submit {
      width: 100%;
      background: var(--saffron);
      color: var(--ink);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      padding: 1rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* FEEDBACK */
    #feedback {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    #feedback.success { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #81c784; }
    #feedback.error { background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.3); color: #ef9a9a; }

    /* PIED */
    .infos {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.3;
    }

    /* Honeypot */
    .ohnohoney { display: none !important; }
  </style>
</head>
<body>

  <img src="Logo_reserveok.png?v=54" alt="Good Taxis 45" class="logo" />

  <div class="heading">
    <h1>Réservez votre <span>taxi</span></h1>
    <p>Loiret · Orléans et tout le département</p>
  </div>

  <span class="badge"><span class="dot"></span>Disponible maintenant · 7j/7 · 24h/24</span>

  <!-- Boutons rapides -->
  <div class="quick-actions">
    <a href="tel:0238241151" class="btn-quick btn-quick--call">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Appeler
    </a>
    <a href="https://wa.me/33238241151?text=Bonjour%2C%20je%20souhaite%20r%C3%A9server%20un%20taxi%20%3A%0A%0A%E2%80%A2%20D%C3%A9part%20%3A%20%0A%E2%80%A2%20Arriv%C3%A9e%20%3A%20%0A%E2%80%A2%20Date%20%26%20heure%20%3A%20%0A%E2%80%A2%20Nombre%20de%20passagers%20%3A%20" target="_blank" rel="noopener" class="btn-quick btn-quick--wa">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20.52 3.48A11.87 11.87 0 0 0 12.05 0C5.46 0 .11 5.34.11 11.93c0 2.1.55 4.15 1.59 5.95L0 24l6.27-1.64a11.93 11.93 0 0 0 5.77 1.47h.01c6.58 0 11.93-5.35 11.94-11.93a11.86 11.86 0 0 0-3.47-8.42zM12.05 21.79h-.01a9.9 9.9 0 0 1-5.05-1.38l-.36-.22-3.72.97 1-3.63-.24-.37a9.88 9.88 0 0 1-1.51-5.23c0-5.47 4.45-9.92 9.92-9.92 2.65 0 5.14 1.03 7.01 2.91a9.86 9.86 0 0 1 2.9 7.02c0 5.47-4.45 9.85-9.94 9.85zm5.44-7.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.16-.17.2-.35.22-.65.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.65-2.05-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.21-.24-.58-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.79.37s-1.04 1.02-1.04 2.48 1.07 2.88 1.22 3.07c.15.2 2.1 3.2 5.08 4.49.71.31 1.27.49 1.7.63.71.23 1.36.2 1.87.12.57-.08 1.76-.72 2.01-1.41.25-.69.25-1.28.17-1.41-.07-.12-.27-.2-.57-.35z"/></svg>
      WhatsApp
    </a>
  </div>

  <div class="sep">ou remplissez le formulaire</div>

  <!-- FORMULAIRE -->
  <div class="form-card">
    <h2>Votre demande de réservation</h2>
    <form id="reservForm" novalidate>

      <!-- Honeypot -->
      <div class="ohnohoney"><input type="text" name="website" tabindex="-1" autocomplete="off" /></div>

      <div class="form-row">
        <div class="form-group">
          <label for="r-firstname">Prénom *</label>
          <input type="text" id="r-firstname" name="firstname" placeholder="Jean" required autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label for="r-lastname">Nom *</label>
          <input type="text" id="r-lastname" name="lastname" placeholder="Dupont" required autocomplete="family-name" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="r-phone">Téléphone *</label>
          <input type="tel" id="r-phone" name="phone" placeholder="06 00 00 00 00" required autocomplete="tel" />
        </div>
        <div class="form-group">
          <label for="r-type">Type de course *</label>
          <select id="r-type" name="type" required>
            <option value="">-- Choisir --</option>
            <option value="particulier">Course particulier</option>
            <option value="gare-aeroport">Gare / Aéroport</option>
            <option value="entreprise">Entreprise / Hôtel</option>
            <option value="assistance">Assistance / Dépannage</option>
            <option value="colis">Livraison colis</option>
            <option value="autre">Autre</option>
          </select>
        </div>
      </div>

      <div class="form-group" style="position:relative">
        <label for="r-from">Départ</label>
        <input type="text" id="r-from" name="from" placeholder="Adresse de départ" autocomplete="off" />
        <ul class="autocomplete-list" id="list-from" hidden></ul>
      </div>

      <div class="form-group" style="position:relative">
        <label for="r-to">Arrivée</label>
        <input type="text" id="r-to" name="to" placeholder="Adresse d'arrivée" autocomplete="off" />
        <ul class="autocomplete-list" id="list-to" hidden></ul>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="r-date">Date</label>
          <input type="date" id="r-date" name="date" />
        </div>
        <div class="form-group">
          <label for="r-time">Heure</label>
          <input type="time" id="r-time" name="time" />
        </div>
      </div>

      <div class="form-group">
        <label for="r-message">Précisions (optionnel)</label>
        <textarea id="r-message" name="message" placeholder="Nombre de passagers, bagages, remarques…"></textarea>
      </div>

      <div class="rgpd">
        <input type="checkbox" id="r-rgpd" name="rgpd" required />
        <label for="r-rgpd">J'accepte que mes données soient utilisées pour traiter ma demande de réservation.</label>
      </div>

      <button type="submit" class="btn-submit" id="r-submit">Envoyer ma demande →</button>

      <div id="feedback"></div>

    </form>
  </div>

  <p class="infos">Good Taxis 45 · Loiret (45) · <a href="https://www.goodtaxi45.fr" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;opacity:0.6;">goodtaxi45.fr</a></p>

  <script>
    // ── Autocomplete BAN ─────────────────────────────────────────────
    function setupAutocomplete(inputId, listId) {
      const input = document.getElementById(inputId);
      const list  = document.getElementById(listId);
      let timer, activeIdx = -1;

      input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 3) { list.hidden = true; return; }
        timer = setTimeout(() => fetchBAN(q, list, input), 220);
      });

      input.addEventListener('keydown', (e) => {
        const items = list.querySelectorAll('li');
        if (!items.length) return;
        if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx + 1, items.length - 1); highlight(items); e.preventDefault(); }
        else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx - 1, 0); highlight(items); e.preventDefault(); }
        else if (e.key === 'Enter' && activeIdx >= 0) { items[activeIdx].click(); e.preventDefault(); }
        else if (e.key === 'Escape') { list.hidden = true; }
      });

      document.addEventListener('click', (e) => { if (!input.contains(e.target)) list.hidden = true; });

      function highlight(items) {
        items.forEach((li, i) => li.classList.toggle('active', i === activeIdx));
      }
    }

    function fetchBAN(q, list, input) {
      fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=5&autocomplete=1&lat=47.9027&lon=1.9090`)
        .then(r => r.json())
        .then(data => {
          list.innerHTML = '';
          if (!data.features?.length) { list.hidden = true; return; }
          data.features.forEach(f => {
            const li = document.createElement('li');
            li.textContent = f.properties.label;
            li.addEventListener('mousedown', (e) => e.preventDefault());
            li.addEventListener('click', () => { input.value = f.properties.label; list.hidden = true; });
            list.appendChild(li);
          });
          list.hidden = false;
        })
        .catch(() => { list.hidden = true; });
    }

    setupAutocomplete('r-from', 'list-from');
    setupAutocomplete('r-to',   'list-to');

    // ── Soumission formulaire ────────────────────────────────────────
    document.getElementById('reservForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form    = e.target;
      const btn     = document.getElementById('r-submit');
      const feedback = document.getElementById('feedback');

      feedback.style.display = 'none';
      feedback.className = '';

      const data = {
        firstname: form.firstname.value.trim(),
        lastname:  form.lastname.value.trim(),
        phone:     form.phone.value.trim(),
        email:     '',
        type:      form.type.value,
        from:      form.from.value.trim(),
        to:        form.to.value.trim(),
        date:      form.date.value,
        time:      form.time.value,
        message:   form.message.value.trim(),
        rgpd:      form.rgpd.checked ? 'on' : '',
        website:   form.website.value,
      };

      if (!data.firstname || !data.lastname || !data.phone || !data.type) {
        feedback.textContent = 'Veuillez remplir les champs obligatoires (prénom, nom, téléphone, type).';
        feedback.className = 'error';
        feedback.style.display = 'block';
        return;
      }
      if (!form.rgpd.checked) {
        feedback.textContent = 'Veuillez accepter la politique de confidentialité.';
        feedback.className = 'error';
        feedback.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        if (res.ok && json.ok) {
          feedback.textContent = '✓ Demande envoyée ! Nous vous rappelons très vite.';
          feedback.className = 'success';
          form.reset();
        } else {
          throw new Error(json.error || 'Erreur inconnue');
        }
      } catch (err) {
        feedback.textContent = 'Erreur : ' + err.message + '. Appelez-nous au 02 38 24 11 51.';
        feedback.className = 'error';
      }

      feedback.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Envoyer ma demande →';
    });
  </script>

</body>
</html>
